name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate flow JSON
        run: |
          pip install jsonschema
          for f in flows/*.json; do
            python -c "import json; json.load(open('$f'))"
            echo "OK $f"
          done
