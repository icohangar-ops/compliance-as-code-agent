# Hostinger / CPU VPS — Groq primary, Ollama optional fallback.

model_list:
  - model_name: bd-coach-ceo
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  - model_name: bd-coach-bd
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY
  - model_name: bd-coach-failover-ceo
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: os.environ/OLLAMA_API_BASE
  - model_name: bd-coach-failover-bd
    litellm_params:
      model: ollama/mistral:7b
      api_base: os.environ/OLLAMA_API_BASE

router_settings:
  routing_strategy: simple-shuffle
  fallbacks:
    - bd-coach-ceo: [bd-coach-failover-ceo]
    - bd-coach-bd:  [bd-coach-failover-bd]

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params: { type: redis, host: redis, port: 6379 }
  callbacks: ["hooks.dlp_hook.DLPHook", "hooks.audit_hook.AuditHook"]
  max_budget: 500
  budget_duration: 30d

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  alerting_threshold: 60
