id: no-hardcoded-secrets
name: No Hardcoded Secrets
framework: SOC2 / Security
description: Prevent credentials, API keys, and tokens from being committed to source control.
rules:
  - id: secret-api-key
    kind: secret_pattern
    description: Hardcoded API key detected
    severity: critical
    pattern: '(?i)(api[_-]?key|apikey)\s*[:=]\s*[''"]?[a-zA-Z0-9_\-]{8,}[''"]?'
    message: Replace hardcoded API key with environment variable or secret manager reference.

  - id: secret-password
    kind: secret_pattern
    description: Hardcoded password detected
    severity: critical
    pattern: '(?i)(password|passwd|pwd)\s*[:=]\s*[''"]?[^\s''"]{6,}[''"]?'
    message: Never commit passwords. Use env vars or a secrets vault.

  - id: secret-token
    kind: secret_pattern
    description: Hardcoded bearer or access token detected
    severity: critical
    pattern: '(?i)(access[_-]?token|bearer|auth[_-]?token)\s*[:=]\s*[''"]?[a-zA-Z0-9_\-\.]{12,}[''"]?'
    message: Replace hardcoded token with runtime secret injection.

  - id: secret-aws-key
    kind: secret_pattern
    description: AWS access key pattern detected
    severity: critical
    pattern: 'AKIA[0-9A-Z]{16}'
    message: Rotate exposed AWS key immediately and use IAM roles or Secrets Manager.

  - id: forbidden-env-file
    kind: forbidden_file
    description: Committed .env file with live secrets
    severity: high
    file_glob: '**/.env'
    message: .env files must not be committed. Use .env.example with placeholders only.
